# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server port (optional)
server.port=8080

#ddl-auto=update  automatically creates tables based on your entities.
#show-sql=true  prints SQL queries in CMD for debugging.
#dialect  postgreSQL-specific SQL commands.

# Uploads folder (absolute or relative to project root)
file.upload-dir=uploads

